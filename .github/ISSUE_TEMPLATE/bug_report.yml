name: Bug report
description: Something in the bootstrap or a skill is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce it.
        For security issues, do NOT file here — see SECURITY.md.
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (native)
        - macOS
        - Windows (native PowerShell)
        - Windows (WSL)
        - Other
    validations:
      required: true
  - type: dropdown
    id: installer
    attributes:
      label: Installer used
      options:
        - install.sh
        - install.ps1
        - Manual / not applicable
    validations:
      required: true
  - type: input
    id: step
    attributes:
      label: Which step failed?
      description: e.g. "gstack + browser", "rtk", "manim deps" (the labels printed in the run summary)
      placeholder: gstack + browser
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead? Paste the relevant output/error.
      render: shell
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Fresh Ubuntu 24.04 container
        2. curl -fsSL .../install.sh | bash
        3. ...
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS version, shell, and versions of git/bun/node/python if relevant.
      render: shell