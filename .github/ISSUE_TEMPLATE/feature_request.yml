name: Feature request
description: Suggest a new skill, agent, hook, or installer improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen? A new skill, an installer change, a hook?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered